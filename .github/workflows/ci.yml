name: Backend CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Backend CI / build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build & Test
        run: ./gradlew build jacocoTestReport --no-daemon

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: build/test-results/**/*.xml
          comment_mode: off  # Checks 탭에서만 확인, PR 댓글 없음

      - name: Add Jacoco Coverage to Job Summary
        if: always()
        run: |
          if [ -f build/reports/jacoco/test/jacocoTestReport.xml ]; then
            echo "## Code Coverage Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Jacoco HTML report uploaded as artifact." >> "$GITHUB_STEP_SUMMARY"
            echo "Minimum line coverage: **0%** (추후 테스트 추가 시 상향)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Jacoco PR Comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          title: "Code Coverage"
          update-comment: true

      - name: Upload Reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            build/reports/tests/
            build/reports/jacoco/
            build/reports/checkstyle/
          retention-days: 14
