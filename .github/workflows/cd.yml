name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: cd-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            873135413383.dkr.ecr.ap-northeast-2.amazonaws.com/hufsdev-backend:${{ github.sha }}
            873135413383.dkr.ecr.ap-northeast-2.amazonaws.com/hufsdev-backend:latest
          cache-from: type=registry,ref=873135413383.dkr.ecr.ap-northeast-2.amazonaws.com/hufsdev-backend:buildcache
          cache-to: type=registry,ref=873135413383.dkr.ecr.ap-northeast-2.amazonaws.com/hufsdev-backend:buildcache,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync deploy files to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "scripts/deploy.sh,docker-compose.yml"
          target: "/opt/hufsdev/backend/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            chmod +x /opt/hufsdev/backend/scripts/deploy.sh
            /opt/hufsdev/backend/scripts/deploy.sh ${{ github.sha }}
