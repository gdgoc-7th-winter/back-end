# ****************************** #
# EC2 BLUE-GREEN DOCKER COMPOSE   #
# Blue: 8080, Green: 8081         #
# Nginx: 80 (ALB target)          #
# ****************************** #

services:
  backend-blue:
    container_name: hufsdev-backend-blue
    image: ${IMAGE_REF:-873135413383.dkr.ecr.ap-northeast-2.amazonaws.com/hufsdev-backend:latest}
    user: "1000:1000"
    restart: "no"
    dns:
      - 172.31.0.2
    ports:
      - "${BLUE_PORT:-8080}:8080"
    env_file:
      - .env-prod
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILE:-prod}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    volumes:
      - ./logs/blue:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  backend-green:
    container_name: hufsdev-backend-green
    image: ${IMAGE_REF:-873135413383.dkr.ecr.ap-northeast-2.amazonaws.com/hufsdev-backend:latest}
    user: "1000:1000"
    restart: "no"
    dns:
      - 172.31.0.2
    ports:
      - "${GREEN_PORT:-8081}:8080"
    env_file:
      - .env-prod
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILE:-prod}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    volumes:
      - ./logs/green:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  nginx:
    container_name: hufsdev-nginx
    image: nginx:1.25-alpine
    restart: always
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
