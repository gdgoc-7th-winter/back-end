version: "3.9"

services:
  backend:
    container_name: REDACTED_DB_PASSWORD-backend
    image: ${IMAGE_REF:-873135413383.dkr.ecr.ap-northeast-2.amazonaws.com/REDACTED_DB_PASSWORD-backend:latest}
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
