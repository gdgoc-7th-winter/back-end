# 테스트
cors:
  allowed-origins:
    - http://localhost:5173

spring:
  cache:
    type: none

  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${NAVER_CLIENT_ID}      # 네이버 개발자 센터에서 발급받은 Client ID
            client-secret: ${NAVER_CLIENT_SECRET}  # 네이버 개발자 센터에서 발급받은 Client Secret
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope:
              - email
            client-name: Naver

          kakao:
            client-id: ${KAKAO_REST_API_KEY}
            client-secret: ${KAKAO_CLIENT_SECRET_KEY}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: account_email
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            client-name: Kakao

          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email

          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            scope:
              - read:user
            redirect-uri: "{baseUrl}/login/oauth2/code/github"

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  datasource:
    url: "jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE TYPE IF NOT EXISTS TIMESTAMPTZ AS TIMESTAMP WITH TIME ZONE"
    username: sa
    password:
    driver-class-name: org.h2.Driver

  data:
    redis:
      host: localhost
      port: 6379
      ttl:
        auth-code-minutes: 5
        session-minutes: 30
        limit-seconds: 60

  mail:
    host: localhost
    port: 587
    username: test@gmail.com
    password:
    domain: "@hufs.ac.kr"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        query.substitutions: TIMESTAMPTZ=TIMESTAMP WITH TIME ZONE

  session:
    store-type: none

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

  health:
    mail:
      enabled: false
