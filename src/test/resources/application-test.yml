# 테스트
cors:
  allowed-origins:
    - http://localhost:5173

spring:
  cache:
    type: none

  datasource:
    url: "jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE TYPE IF NOT EXISTS TIMESTAMPTZ AS TIMESTAMP WITH TIME ZONE"
    username: sa
    password:
    driver-class-name: org.h2.Driver

  data:
    redis:
      host: localhost
      port: 6379
      ttl:
        auth-code-minutes: 5
        session-minutes: 30
        limit-seconds: 60

  mail:
    host: localhost
    port: 587
    username: test@gmail.com
    password:
    domain: "@hufs.ac.kr"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        query.substitutions: TIMESTAMPTZ=TIMESTAMP WITH TIME ZONE

  session:
    store-type: none

cloud:
  aws:
    s3:
      access-key-id: test-access-key
      secret-access-key: test-secret-key
      bucket-name-public: test-bucket
      region: ap-northeast-2
      presigned-url-expire-seconds: 600
      max-file-size-bytes: 5242880
    cloudfront:
      domain: https://cdn.test

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

  health:
    mail:
      enabled: false
