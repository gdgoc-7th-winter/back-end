# 운영 서버
piston:
  api:
    url: ${PISTON_API_URL}

cloud:
  aws:
    s3:
      access-key-id: ${S3_AWS_ACCESS_KEY_ID}
      secret-access-key: ${S3_AWS_SECRET_ACCESS_KEY}
      bucket-name-public: ${S3_BUCKET_NAME_PUBLIC}
    cloudfront:
      domain: ${CLOUDFRONT_DOMAIN:}

cors:
  allowed-origins:
    - https://api.hufs.dev # Swagger UI - 이후 Swagger는 노출하지 않도록 수정
    - https://hufs.dev
    - https://www.hufs.dev
    - http://localhost:5173  # 로컬 개발 시 프로덕션 API 호출용

logging:
  file:
    path: /app/logs
  logback:
    rollingpolicy:
      max-file-size: 50MB
      total-size-cap: 1GB
      max-history: 14
  level:
    org.hibernate.SQL: warn
    root: info

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true

    readinessstate:
      enabled: true

    mail:
      enabled: false

csrf:
  cookie:
    # registrable domain
    domain: ${CSRF_COOKIE_DOMAIN:hufs.dev}
    secure: true
    same-site: Lax
    path: /

spring:
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 3s
      ttl:
        auth-code-minutes: 5
        session-minutes: 30
        limit-seconds: 60
      ssl:
        enabled: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    domain: "@hufs.ac.kr"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope:
              - email
            client-name: Naver

          kakao:
            client-id: ${KAKAO_REST_API_KEY}
            client-secret: ${KAKAO_CLIENT_SECRET_KEY}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: account_email
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            client-name: Kakao

          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email

          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            scope:
              - read:user
            redirect-uri: "{baseUrl}/login/oauth2/code/github"

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
