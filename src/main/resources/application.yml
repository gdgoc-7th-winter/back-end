# 공통 설정
cloud:
  aws:
    s3:
      region: ap-northeast-2
      presigned-url-expire-seconds: 600
      max-file-size-bytes: 5242880

cors:
  allowed-origins:
    - http://localhost:5173

csrf:
  cookie:
    domain: ""
    secure: false
    same-site: Lax
    path: /

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
  forward-headers-strategy: framework

spring:
  application:
    name: hufsdev

  data:
    web:
      pageable:
        max-page-size: 100

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  session:
    store-type: redis
    redis:
      namespace: "{hufsdev:session}"

ranking:
  max-page-size: 100
  default-page-size: 20
  use-window-rank-sql: true

contribution:
  outbox:
    poll-interval-ms: 500
    batch-size: 50
    max-attempts: 8
    stale-processing-minutes: 5
    reclaim-interval-ms: 60000
    use-skip-locked: true

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs
