# 로컬 개발용 (PostgreSQL + Redis)
# Piston 코드 실행은 퍼블릭 API(application-local.yml의 piston.api.url)를 사용합니다.
# cgroup 이슈로 인해 로컬 Docker 실행을 제거하였습니다.
services:
  postgres:
    image: postgres:17-alpine
    container_name: hufsdev-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hufsdev
      POSTGRES_USER: hufsdev
      POSTGRES_PASSWORD: hufsdev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hufsdev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
