# 로컬 개발용 (PostgreSQL + Redis)
services:
  postgres:
    image: postgres:17-alpine
    container_name: REDACTED_DB_PASSWORD-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: REDACTED_DB_PASSWORD
      POSTGRES_USER: REDACTED_DB_PASSWORD
      POSTGRES_PASSWORD: REDACTED_DB_PASSWORD
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: REDACTED_DB_PASSWORD-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
